
services:
  backend:
    build: ./backend
    container_name: document_backend
    # Use --reload only in development to see code changes instantly
    command: > 
      sh -c "alembic upgrade head &&
              uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DOCKER_CONTAINER: "true"
      C_FORCE_ROOT: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploaded_files:/app/app/files
    deploy:
      resources:
        limits:
          memory: 1G  # Keeps the backend from eating too much RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-document_backend}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-document_backend}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:latest
    container_name: redis_server
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: quay.io/minio/minio
    container_name: minio
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: celery_worker
    command: celery -A app.infrastructure.queue.celery_app worker --loglevel=info -P solo
    env_file: .env
    environment:
      DOCKER_CONTAINER: "true"
      C_FORCE_ROOT: "true"
    # Removed the OLLAMA_BASE_URL=http://host.docker.internal:11434 because it will now be read 
    # from .env file (pointing to Railway)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploaded_files:/app/app/files
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  engram_frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
    container_name: engram_frontend
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  uploaded_files:
  frontend_node_modules: